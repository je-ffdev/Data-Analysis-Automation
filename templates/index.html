<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JBP CSV Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      color: #ffffff;
      letter-spacing: 2px;
    }

    header p {
      color: #888;
      margin-top: 8px;
    }

    .upload-area {
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      max-width: 600px;
      margin: 0 auto 30px;
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: #00aaff;
    }

    .upload-area p { color: #888; margin-top: 10px; }

    .upload-area input { display: none; }

    .btn {
      display: block;
      margin: 0 auto;
      padding: 12px 36px;
      background: #00aaff;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn:hover { background: #0088cc; }
    .btn:disabled { background: #444; color: #888; cursor: not-allowed; }

    #status {
      text-align: center;
      margin: 20px 0;
      color: #888;
      min-height: 24px;
    }

    .results { max-width: 900px; margin: 0 auto; }

    .file-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 32px;
      border: 1px solid #2a2a2a;
    }

    .file-card h2 {
      font-size: 1.2rem;
      color: #00aaff;
      margin-bottom: 16px;
    }

    .meta {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin: 24px 0 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    th {
      background: #222;
      color: #aaa;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    td {
      padding: 7px 12px;
      border-bottom: 1px solid #222;
      color: #ccc;
    }

    tr:hover td { background: #1f1f1f; }

    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .charts img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
    }

    .file-list {
      text-align: center;
      color: #aaa;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>JBP CSV Analyzer</h1>
    <p>Upload CSV files and get instant analysis</p>
  </header>

  <div class="upload-area" id="dropZone">
    <svg width="40" height="40" fill="none" stroke="#555" stroke-width="2"
         viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>Drag & drop CSV files here or click to browse</p>
    <input type="file" id="fileInput" multiple accept=".csv">
  </div>

  <div class="file-list" id="fileList"></div>
  <button class="btn" id="analyzeBtn" disabled>Analyze</button>
  <div id="status"></div>
  <div class="results" id="results"></div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const fileList = document.getElementById("fileList");
    const status = document.getElementById("status");
    const results = document.getElementById("results");

    let selectedFiles = [];

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith(".csv"));
      updateFileList();
    });

    fileInput.addEventListener("change", () => {
      selectedFiles = Array.from(fileInput.files);
      updateFileList();
    });

    function updateFileList() {
      if (selectedFiles.length === 0) {
        fileList.textContent = "";
        analyzeBtn.disabled = true;
        return;
      }
      fileList.textContent = selectedFiles.map(f => f.name).join(", ");
      analyzeBtn.disabled = false;
    }

    analyzeBtn.addEventListener("click", async () => {
      if (selectedFiles.length === 0) return;

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append("files", f));

      analyzeBtn.disabled = true;
      status.textContent = "Analyzing...";
      results.innerHTML = "";

      try {
        const res = await fetch("/analyze", { method: "POST", body: formData });
        const data = await res.json();

        if (data.error) {
          status.textContent = "Error: " + data.error;
          return;
        }

        status.textContent = `Done — ${data.length} file(s) analyzed.`;
        renderResults(data);
      } catch (err) {
        status.textContent = "Something went wrong.";
        console.error(err);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    function renderResults(data) {
      results.innerHTML = "";
      data.forEach(file => {
        const card = document.createElement("div");
        card.className = "file-card";

        let html = `<h2>${file.filename}</h2>`;
        html += `<div class="meta">${file.shape.rows} rows × ${file.shape.cols} columns after cleaning</div>`;

        // Summary stats table
        html += `<div class="section-title">Summary Statistics</div>`;
        html += buildSummaryTable(file.summary);

        // Value counts
        html += `<div class="section-title">Top Values (Categorical Columns)</div>`;
        html += buildValueCountsTables(file.value_counts);

        // Charts
        if (file.charts.length > 0) {
          html += `<div class="section-title">Charts</div><div class="charts">`;
          file.charts.forEach(b64 => {
            html += `<img src="data:image/png;base64,${b64}" alt="chart">`;
          });
          html += `</div>`;
        }

        card.innerHTML = html;
        results.appendChild(card);
      });
    }

    function buildSummaryTable(summary) {
      const stats = Object.keys(summary);
      if (stats.length === 0) return "<p style='color:#555'>No numeric columns</p>";
      const rows = Object.keys(summary[stats[0]]);
      let t = `<table><tr><th>Stat</th>`;
      stats.forEach(s => t += `<th>${s}</th>`);
      t += `</tr>`;
      rows.forEach(row => {
        t += `<tr><td>${row}</td>`;
        stats.forEach(s => t += `<td>${summary[s][row] ?? "—"}</td>`);
        t += `</tr>`;
      });
      return t + `</table>`;
    }

    function buildValueCountsTables(valueCounts) {
      let html = "";
      for (const [col, counts] of Object.entries(valueCounts)) {
        html += `<p style="color:#666; font-size:0.8rem; margin: 10px 0 4px;">${col}</p>`;
        html += `<table><tr><th>Value</th><th>Count</th></tr>`;
        for (const [val, count] of Object.entries(counts)) {
          html += `<tr><td>${val}</td><td>${count}</td></tr>`;
        }
        html += `</table>`;
      }
      return html;
    }
  </script>

</body>
</html>
